# permissions for end users to view onpremexecutors.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: onpremexecutor-viewer-role
rules:
- apiGroups:
  - mlops.cnvrg.io
  resources:
  - onpremexecutors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mlops.cnvrg.io
  resources:
  - onpremexecutors/status
  verbs:
  - get
