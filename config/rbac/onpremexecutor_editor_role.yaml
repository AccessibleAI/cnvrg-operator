# permissions for end users to edit onpremexecutors.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: onpremexecutor-editor-role
rules:
- apiGroups:
  - mlops.cnvrg.io
  resources:
  - onpremexecutors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mlops.cnvrg.io
  resources:
  - onpremexecutors/status
  verbs:
  - get
