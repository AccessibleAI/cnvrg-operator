operatorImage: docker.io/cnvrg/cnvrg-operator
hookImage: "docker.io/cnvrg/cnvrg-tools:v0.3"
computeProfile: medium
computeProfiles:
  large:
    storage: 100Gi
    cnvrgApp:
      cpu: 4
      memory: 8Gi
      sidekiq:
        cpu: 4
        memory: 8Gi
        replicas: 2
      searchkiq:
        cpu: 1
        memory: 2Gi
        replicas: 1
      systemkiq:
        cpu: 500m
        memory: 500Mi
        replicas: 1
    pg:
      cpu: 4
      memory: 8Gi
    minio:
      cpu: 2
      memory: 4Gi
    es:
      cpu: 1
      memory: 1Gi
    elastalert:
      cpu: 1
      memory: 1Gi
    hyper:
      cpu: 1
      memory: 2Gi
    prometheus:
      cpu: 1
      memory: 1Gi
    redis:
      cpu: 500m
      memory: 1Gi
  medium:
    storage: 100Gi
    cnvrgApp:
      cpu: 2
      memory: 4Gi
      sidekiq:
        cpu: 2
        memory: 4Gi
        replicas: 2
      searchkiq:
        cpu: 1
        memory: 1Gi
        replicas: 1
      systemkiq:
        cpu: 500m
        memory: 500Mi
        replicas: 1
    pg:
      cpu: 2
      memory: 4Gi
    minio:
      cpu: 1
      memory: 2Gi
    es:
      cpu: 1
      memory: 1Gi
    hyper:
      cpu: 100m
      memory: 200Mi
    elastalert:
      cpu: 100m
      memory: 200Mi
    prometheus:
      cpu: 1
      memory: 1Gi
    redis:
      cpu: 500m
      memory: 1Gi
  small:
    storage: 3Gi
    cnvrgApp:
      cpu: 100m
      memory: 100Mi
      sidekiq:
        cpu: 100m
        memory: 100Mi
        replicas: 1
      searchkiq:
        cpu: 100m
        memory: 100Mi
        replicas: 1
      systemkiq:
        cpu: 100m
        memory: 100Mi
        replicas: 1
    pg:
      cpu: 100m
      memory: 100Mi
    minio:
      cpu: 100m
      memory: 100Mi
    es:
      cpu: 100m
      memory: 100Mi
    hyper:
      cpu: 100m
      memory: 200Mi
    elastalert:
      cpu: 100m
      memory: 100Mi
    prometheus:
      cpu: 100m
      memory: 100Mi
    redis:
      cpu: 100m
      memory: 100Mi

controlPlan:
  baseConfig:
    agentCustomTag: latest
    checkJobExpiration: "true"
    cnvrgJobUid: "1000"
    defaultComputeConfig: /opt/kube
    defaultComputeName: default
    extractTagsFromCmd: "false"
    intercom: "true"
    passengerAppEnv: app
    railsEnv: app
    runJobsOnSelfCluster: "true"
    sentryUrl: https://4409141e4a204282bd1f5c021e587509:dc15f684faa9479a839cf913b98b4ee2@sentry.cnvrg.io/32
    useStdout: "true"
  cnvrgRouter:
    enabled: "false"
    image: nginx
    nodePort: 30081
    port: 80
    svcName: routing-service
  hyper:
    cpuLimit: 2
    cpuRequest: 100m
    enableReadinessProbe: "true"
    enabled: "true"
    image: cnvrg/hyper-server:latest
    memoryLimit: 4Gi
    memoryRequest: 200Mi
    nodePort: 30050
    port: 5050
    readinessPeriodSeconds: 100
    readinessTimeoutSeconds: 60
    replicas: 1
    svcName: hyper
    token: token
  ldap:
    account: userPrincipalName
    enabled: "false"
  objectStorage:
    cnvrgStorageAccessKey: AKIAIOSFODNN7EXAMPLE
    cnvrgStorageBucket: cnvrg-storage
    cnvrgStorageRegion: eastus
    cnvrgStorageSecretKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    cnvrgStorageType: minio
    gcpKeyfileMountPath: /tmp/gcp_keyfile
    gcpKeyfileName: key.json
    gcpStorageSecret: gcp-storage-secret
    minioSseMasterKey: my-minio-key:a310aadcefdb634b748ae31225f175e3f64591f955dfc66ccc20e128a6817ff9
    secretKeyBase: 0d2b33c2cc19cfaa838d3c354354a18fcc92beaaa8e97889ef99341c8aaf963ad3afcf0f7c20454cabb5c573c3fc35b60221034e109f4fb651ed1415bf61e9d5
    stsIv: DeJ/CGz/Hkb/IbRe4t1xLg==
    stsKey: 05646d3cbf8baa5be7150b4283eda07d
  rbac:
    role: cnvrg-control-plan-role
    roleBindingName: cnvrg-control-plan-binding
    serviceAccountName: cnvrg
  registry:
    name: cnvrg-registry
    url: docker.io
  searchkiq:
    cpu: 750m
    enabled: "true"
    killTimeout: 60
    memory: 750Mi
    replicas: 1
  seeder:
    createBucketCmd: mb.sh
    image: docker.io/cnvrg/cnvrg-boot:v0.26-tenancy
    seedCmd: rails db:migrate && rails db:seed && rails libraries:update
  sidekiq:
    cpu: 1750m
    enabled: "true"
    killTimeout: 60
    memory: 3750Mi
    replicas: 2
    split: "true"
  smtp: {}
  systemkiq:
    cpu: 500m
    enabled: "false"
    killTimeout: 60
    memory: 500Mi
    replicas: 1
  tenancy:
    dedicatedNodes: "false"
    enabled: "false"
    key: cnvrg-taint
    value: "true"
  webapp:
    cpu: 2
    enabled: "true"
    failureThreshold: 4
    image: cnvrg/core:3.1.5
    initialDelaySeconds: 10
    memory: 4Gi
    nodePort: 30080
    oauthProxy:
      skipAuthRegex:
      - ^\/api
      - \/assets
      - \/healthz
      - \/public
      - \/pack
      - \/vscode.tar.gz
      - \/gitlens.vsix
      - \/ms-python-release.vsix
    passengerMaxPoolSize: 20
    port: 8080
    readinessPeriodSeconds: 25
    readinessTimeoutSeconds: 20
    replicas: 1
    svcName: app
dbs:
  es:
    cpuLimit: 2
    cpuRequest: 1
    enabled: "true"
    fsGroup: 1000
    image: docker.io/cnvrg/cnvrg-es:v7.8.1
    memoryLimit: 4Gi
    memoryRequest: 1Gi
    nodePort: 32200
    patchEsNodes: "true"
    port: 9200
    runAsUser: 1000
    serviceAccount: es
    storageSize: 30Gi
    svcName: elasticsearch
  minio:
    cpuRequest: 1
    enabled: "true"
    image: docker.io/minio/minio:RELEASE.2020-09-17T04-49-20Z
    memoryRequest: 2Gi
    nodePort: 30090
    port: 9000
    replicas: 1
    serviceAccount: ""
    sharedStorage:
      consistentHash:
        key: httpQueryParameterName
        value: uploadId
      enabled: enabled
    storageSize: 100Gi
    svcName: minio
  pg:
    cpuRequest: 4
    dbname: cnvrg_production
    enabled: "true"
    fixpg: "true"
    fsGroup: 26
    hugePages:
      enabled: "false"
      size: 2Mi
    image: centos/postgresql-12-centos7
    maxConnections: 100
    memoryRequest: 4Gi
    pass: pg_pass
    port: 5432
    runAsUser: 26
    secretName: cnvrg-pg-secret
    serviceAccount: default
    sharedBuffers: 64MB
    storageSize: 80Gi
    svcName: postgres
    user: cnvrg
  redis:
    appendonly: "yes"
    enabled: "true"
    image: docker.io/cnvrg/cnvrg-redis:v3.0.5.c2
    limits:
      cpu: 1
      memory: 2Gi
    port: 6379
    requests:
      cpu: 100m
      memory: 200Mi
    serviceAccount: default
    storageSize: 10Gi
    svcName: redis
logging:
  elastalert:
    containerPort: 3030
    cpuLimit: 400m
    cpuRequest: 100m
    enabled: "true"
    fsGroup: 1000
    image: bitsensor/elastalert:3.0.0-beta.1
    memoryLimit: 800Mi
    memoryRequest: 200Mi
    nodePort: 32030
    port: 80
    runAsUser: 1000
    storageClass: use-default
    storageSize: 30Gi
    svcName: elastalert
  enabled: "true"
  kibana:
    cpuLimit: 1
    cpuRequest: 100m
    enabled: "true"
    image: docker.elastic.co/kibana/kibana-oss:7.8.1
    memoryLimit: 2Gi
    memoryRequest: 100Mi
    nodePort: 30601
    oauthProxy: {}
    port: 8080
    serviceAccount: default
    svcName: kibana
monitoring:
  enabled: "true"
  grafana:
    enabled: "true"
    image: grafana/grafana:7.3.4
    nodePort: 30012
    oauthProxy:
      skipAuthRegex:
      - \/api\/health
    port: 8080
    svcName: grafana
  prometheus:
    cpuRequest: 1
    enabled: "true"
    image: quay.io/prometheus/prometheus:v2.22.1
    memoryRequest: 1Gi
    nodePort: 30909
    port: 9090
    storageClass: use-default
    storageSize: 100Gi
    svcName: prometheus
  upstreamPrometheus: prometheus-operated.cnvrg-infra.svc.cluster.local:9090
networking:
  https:
    enabled: "false"
  ingress:
    ingressType: istio
    perTryTimeout: 3600s
    retriesAttempts: 5
    timeout: 18000s
sso:
  enabled: "false"
  image: cnvrg/cnvrg-oauth-proxy:v7.0.1.c2
  redisConnectionUrl: redis://redis:6379
